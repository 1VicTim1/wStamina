      flags-unavailable: "%prefix%&cФлаги WorldGuard недоступны. Интеграция отключена."
      init-failed: "%prefix%&cНе удалось инициализировать WorldGuard hook: %reason%"
      flags-changed-restart: "%prefix%&eИмена флагов WorldGuard изменены. Нужен рестарт сервера."
      create-failed: "%prefix%&cНе удалось создать WorldGuard hook: %reason%"
      runtime-error: "%prefix%&cОшибка WorldGuard hook: %reason%"
    luckperms:
      init-failed: "%prefix%&cНе удалось инициализировать LuckPerms hook: %reason%"
      create-failed: "%prefix%&cНе удалось создать LuckPerms hook: %reason%"
    betterhud:
      init-failed: "%prefix%&cНе удалось инициализировать BetterHud hook: %reason%"
      create-failed: "%prefix%&cНе удалось создать BetterHud hook: %reason%"
