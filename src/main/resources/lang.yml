prefix: "&7[&awStamina&7] "

messages:
  plugin:
    enabled: "%prefix%&aПлагин включен."
    disabled: "%prefix%&eПлагин выключен."
    command-missing: "%prefix%&cКоманда 'wstamina' не найдена в paper-plugin.yml."

  command:
    usage: "%prefix%&eИспользование: /%label% reload"
    no-permission: "%prefix%&cУ вас нет прав для этой команды."
    reloaded: "%prefix%&aКонфигурация и язык перезагружены."
    stamina-self: "%prefix%&aСтамина: &f%current%&7/&f%max% &7(&f%percent%%&7)"

  hooks:
